# Bun configuration file
# https://bun.sh/docs/runtime/bunfig

[install]
# Use isolated installs to prevent phantom dependencies
linker = "isolated"

# Install peer dependencies by default
peer = true

# Enable optional dependencies
optional = true

# Enable dev dependencies (except in production)
dev = true

# Security: Only install packages published at least 3 days ago
# This protects against supply chain attacks
minimumReleaseAge = 259200  # 3 days in seconds

# Exclude trusted packages from the age gate
minimumReleaseAgeExcludes = [
  "@types/node",
  "@types/react",
  "@types/react-dom",
  "typescript"
]

[install.cache]
# Cache directory for packages
# dir = "~/.bun/install/cache"

[test]
# Test configuration
preload = []
coverage = true
